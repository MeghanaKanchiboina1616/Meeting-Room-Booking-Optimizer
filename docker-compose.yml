services:
  postgres:
    image: postgres:17
    container_name: meeting-room-optimizer-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meeting_optimizer

    ports:
      - "5433:5432"

    volumes:
      - meeting_room_optimizer_pgdata:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  meeting_room_optimizer_pgdata: